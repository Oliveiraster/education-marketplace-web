<div class="page-container">
  <h2>Foto de perfil</h2>
  <div class="photo-wrapper">
    <img [src]="imageSrc()" alt="Avatar" class="avatar" />

    <input
      type="file"
      accept="image/png, image/jpeg"
      (change)="onFileSelected($event)"
      hidden
      #fileInput
    />

    <div class="actions">
      <button type="button" (click)="fileInput.click()">Escolher foto</button>

      @if (filePreview()) {
        <button type="button" (click)="removePhoto()">Remover</button>
      }
    </div>
  </div>

  <button type="button" (click)="upload()" [disabled]="!selectedFile()">Salvar</button>
</div>
